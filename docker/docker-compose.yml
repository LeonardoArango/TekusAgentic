services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tekus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tekus}
      POSTGRES_DB: ${POSTGRES_DB:-tekus_agente}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tekus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    # No env_file: las variables se toman del entorno del proceso que lanza
    # `docker compose`. En prod eso significa `doppler run -- docker compose
    # up`; en dev local sin Doppler, usar `docker compose --env-file ../.env up`.
    environment:
      - META_WA_TOKEN
      - META_WA_PHONE_NUMBER_ID
      - META_WA_BUSINESS_ACCOUNT_ID
      - META_WA_VERIFY_TOKEN
      - META_WA_APP_SECRET
      - ODOO_URL
      - ODOO_DB
      - ODOO_USERNAME
      - ODOO_PASSWORD
      - CONFLUENCE_URL
      - CONFLUENCE_USERNAME
      - CONFLUENCE_API_TOKEN
      - ENTRA_TENANT_ID
      - ENTRA_CLIENT_ID
      - ENTRA_CLIENT_SECRET
      - ANTHROPIC_API_KEY
      - ANTHROPIC_MODEL
      - DATABASE_URL
      - REDIS_URL
      - EMBEDDINGS_SERVICE_URL
      - RERANKER_SERVICE_URL
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
