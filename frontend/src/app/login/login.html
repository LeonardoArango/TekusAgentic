<div class="login">
  <div class="login__panel">
    <div class="login__brand">
      <img src="assets/logos/k-mark-teal.png" alt="Tekus" class="login__mark" />
      <span class="login__word">tekus</span>
      <span class="login__badge">console</span>
    </div>

    <div class="login__card">
      <p class="login__eyebrow">Plataforma interna</p>
      <h1 class="login__title">Agente de WhatsApp</h1>
      <p class="login__sub">
        Soporte y ventas asistidos por IA, con la base de conocimiento de Tekus.
      </p>

      <button type="button" class="login__btn" (click)="auth.login()">
        <svg viewBox="0 0 21 21" class="login__ms" aria-hidden="true">
          <rect x="1" y="1" width="9" height="9" fill="#f25022" />
          <rect x="11" y="1" width="9" height="9" fill="#7fba00" />
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef" />
          <rect x="11" y="11" width="9" height="9" fill="#ffb900" />
        </svg>
        Iniciar sesión con Microsoft 365
      </button>

      <p class="login__note">
        Acceso exclusivo con tu cuenta corporativa de Tekus.
      </p>
    </div>

    <p class="login__foot">Tekus · Innovación y Nuevos Negocios</p>
  </div>
</div>
